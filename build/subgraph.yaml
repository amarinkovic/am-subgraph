specVersion: 0.0.2
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: MyMessenger
    network: rinkeby
    source:
      address: "0xAcF94834F381873a4fFFfbAA867561D93Fc797ea"
      abi: MyMessenger
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.5
      language: wasm/assemblyscript
      entities:
        - MyMessage
      abis:
        - name: MyMessenger
          file: MyMessenger/abis/MyMessenger.json
      eventHandlers:
        - event: MyMessage(uint256,string)
          handler: handleMyMessage
      file: MyMessenger/MyMessenger.wasm
